<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SabjiHaat – Bazaar Se Ghar Tak</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d7a3a;
    --green-light: #e8f5e9;
    --green-mid: #4caf50;
    --orange: #f57c00;
    --orange-light: #fff3e0;
    --red: #e53935;
    --white: #ffffff;
    --bg: #f4f6f0;
    --text: #1a2e1a;
    --text-muted: #6b7c6b;
    --card: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Baloo 2', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1b5e20 0%, #2d7a3a 60%, #388e3c 100%);
    padding: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }
  .logo-block { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 44px; height: 44px; background: #fff;
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .logo-text h1 { color: #fff; font-size: 20px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
  .logo-text p { color: #a5d6a7; font-size: 11px; font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .cart-btn {
    background: var(--orange); color: #fff; border: none;
    border-radius: 12px; padding: 8px 14px; font-family: 'Baloo 2', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(245,124,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cart-btn:active { transform: scale(0.95); }
  .cart-count {
    background: #fff; color: var(--orange);
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }

  /* DELIVERY BANNER */
  .delivery-banner {
    background: rgba(0,0,0,0.2); padding: 6px 16px;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #c8e6c9;
  }

  /* SEARCH */
  .search-bar {
    background: #fff; margin: 12px; border-radius: 12px;
    display: flex; align-items: center; padding: 0 12px;
    box-shadow: var(--shadow);
  }
  .search-bar input {
    flex: 1; border: none; outline: none; padding: 12px 8px;
    font-family: 'Baloo 2', sans-serif; font-size: 14px; color: var(--text);
    background: transparent;
  }
  .search-bar span { font-size: 18px; color: var(--text-muted); }

  /* HERO BANNER */
  .hero {
    margin: 0 12px 12px;
    background: linear-gradient(135deg, #ff6f00, #f57c00);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    overflow: hidden; position: relative;
    box-shadow: 0 4px 16px rgba(245,124,0,0.3);
  }
  .hero::after {
    content: '🛵'; font-size: 60px; position: absolute;
    right: 16px; bottom: -4px; opacity: 0.3;
  }
  .hero h2 { color: #fff; font-size: 18px; font-weight: 800; line-height: 1.2; }
  .hero p { color: rgba(255,255,255,0.85); font-size: 12px; margin-top: 4px; }
  .hero-badge {
    background: #fff; color: var(--orange);
    border-radius: 8px; padding: 4px 10px;
    font-size: 11px; font-weight: 800; white-space: nowrap;
  }

  /* CATEGORIES */
  .section-title {
    padding: 8px 16px 8px; font-size: 16px; font-weight: 800; color: var(--text);
  }
  .categories {
    display: flex; gap: 10px; padding: 4px 16px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-chip {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--card); border-radius: 14px; padding: 10px 14px;
    cursor: pointer; border: 2px solid transparent; white-space: nowrap;
    transition: all 0.2s; box-shadow: var(--shadow); min-width: 68px;
  }
  .cat-chip.active { border-color: var(--green); background: var(--green-light); }
  .cat-chip span:first-child { font-size: 22px; }
  .cat-chip span:last-child { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .cat-chip.active span:last-child { color: var(--green); }

  /* PRODUCTS */
  .products-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 4px 12px 100px;
  }
  .product-card {
    background: var(--card); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    transition: transform 0.15s;
  }
  .product-card:active { transform: scale(0.98); }
  .product-img {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; background: var(--green-light);
    position: relative;
  }
  .product-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--red); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px;
  }
  .product-info { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .product-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .product-unit { font-size: 11px; color: var(--text-muted); }
  .product-bottom {
    display: flex; align-items: center; justify-content: space-between; margin-top: 6px;
  }
  .product-price { font-size: 16px; font-weight: 800; color: var(--green); }
  .add-btn {
    background: var(--green); color: #fff; border: none;
    border-radius: 10px; width: 32px; height: 32px;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-weight: 700;
    transition: background 0.15s;
  }
  .add-btn:active { background: #1b5e20; }
  .qty-control {
    display: flex; align-items: center; gap: 6px;
  }
  .qty-btn {
    background: var(--green-light); color: var(--green); border: none;
    border-radius: 8px; width: 28px; height: 28px; font-size: 16px;
    cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center;
  }
  .qty-num { font-size: 14px; font-weight: 800; color: var(--text); min-width: 16px; text-align: center; }

  /* BOTTOM CART BAR */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--green); color: #fff;
    padding: 14px 20px; display: none;
    align-items: center; justify-content: space-between;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    cursor: pointer; z-index: 200;
  }
  .cart-bar.visible { display: flex; }
  .cart-bar-left { display: flex; flex-direction: column; }
  .cart-bar-items { font-size: 12px; opacity: 0.85; }
  .cart-bar-total { font-size: 18px; font-weight: 800; }
  .cart-bar-btn {
    background: #fff; color: var(--green);
    border: none; border-radius: 12px; padding: 10px 18px;
    font-family: 'Baloo 2', sans-serif; font-size: 14px; font-weight: 800;
    cursor: pointer;
  }

  /* CART MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 24px 24px 0 0;
    width: 100%; max-height: 85vh; overflow-y: auto;
    padding: 0 0 20px;
  }
  .modal-handle {
    width: 40px; height: 4px; background: #ddd;
    border-radius: 2px; margin: 12px auto;
  }
  .modal-title {
    font-size: 18px; font-weight: 800; padding: 0 20px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .cart-items { padding: 0 16px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid #f5f5f5;
  }
  .cart-item-emoji { font-size: 28px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 700; }
  .cart-item-price { font-size: 12px; color: var(--text-muted); }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .cart-item-total { font-size: 14px; font-weight: 800; color: var(--green); }

  /* BILL SUMMARY */
  .bill { background: var(--green-light); border-radius: 16px; margin: 12px 16px; padding: 14px; }
  .bill-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .bill-row.total { font-size: 16px; font-weight: 800; border-top: 1px dashed #a5d6a7; margin-top: 6px; padding-top: 10px; }
  .bill-delivery { font-size: 11px; color: var(--text-muted); padding: 4px 0 0; }

  .whatsapp-btn {
    margin: 12px 16px 0;
    background: #25d366; color: #fff; border: none;
    border-radius: 14px; padding: 16px;
    font-family: 'Baloo 2', sans-serif; font-size: 16px; font-weight: 800;
    width: calc(100% - 32px); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(37,211,102,0.3);
  }
  .empty-cart {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 14px;
  }
  .empty-cart .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  /* TOAST */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: #1b5e20; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none;
    transition: all 0.3s; z-index: 500; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="logo-block">
      <div class="logo-icon">🥦</div>
      <div class="logo-text">
        <h1>SabjiHaat</h1>
        <p>Bazaar Se Ghar Tak</p>
      </div>
    </div>
    <div class="header-right">
      <button class="cart-btn" onclick="openCart()">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
  <div class="delivery-banner">
    ⚡ 30-50 minute delivery &nbsp;•&nbsp; Kishanganj ke andar
  </div>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <span>🔍</span>
  <input type="text" placeholder="Sabzi, Dal, Fruits... search karo" oninput="filterProducts(this.value)" id="searchInput">
</div>

<!-- HERO BANNER -->
<div class="hero">
  <div>
    <h2>Fresh Sabzi<br>Ghar Pe Mangao!</h2>
    <p>Market se seedha aapke darwaze tak</p>
  </div>
  <div class="hero-badge">🕐 30-50 Min</div>
</div>

<!-- CATEGORIES -->
<div class="section-title">Categories</div>
<div class="categories" id="categories">
  <div class="cat-chip active" onclick="filterCat('all', this)"><span>🛒</span><span>Sab</span></div>
  <div class="cat-chip" onclick="filterCat('sabzi', this)"><span>🥬</span><span>Sabzi</span></div>
  <div class="cat-chip" onclick="filterCat('fruits', this)"><span>🍎</span><span>Fruits</span></div>
  <div class="cat-chip" onclick="filterCat('dal', this)"><span>🫘</span><span>Dal</span></div>
  <div class="cat-chip" onclick="filterCat('masale', this)"><span>🌶️</span><span>Masale</span></div>
  <div class="cat-chip" onclick="filterCat('dairy', this)"><span>🥛</span><span>Dairy</span></div>
</div>

<!-- PRODUCTS -->
<div class="section-title" id="productTitle">Sab Products</div>
<div class="products-grid" id="productsGrid"></div>

<!-- BOTTOM CART BAR -->
<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cart-bar-left">
    <span class="cart-bar-items" id="cartBarItems">0 items</span>
    <span class="cart-bar-total" id="cartBarTotal">₹0</span>
  </div>
  <button class="cart-bar-btn">Order Karo →</button>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal" onclick="closeCartOutside(event)">
  <div class="modal" id="modalInner">
    <div class="modal-handle"></div>
    <div class="modal-title">🛒 Aapka Cart</div>
    <div id="cartContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const products = [
  // Sabzi
  { id:1, name:'Aalu', emoji:'🥔', unit:'1 kg', price:30, cat:'sabzi' },
  { id:2, name:'Pyaaz', emoji:'🧅', unit:'1 kg', price:35, cat:'sabzi' },
  { id:3, name:'Tamatar', emoji:'🍅', unit:'500 g', price:25, cat:'sabzi' },
  { id:4, name:'Lauki', emoji:'🥒', unit:'1 kg', price:20, cat:'sabzi' },
  { id:5, name:'Baingan', emoji:'🍆', unit:'500 g', price:22, cat:'sabzi' },
  { id:6, name:'Bhindi', emoji:'🥬', unit:'500 g', price:30, cat:'sabzi' },
  { id:7, name:'Gobhi', emoji:'🥦', unit:'1 pcs', price:35, cat:'sabzi' },
  { id:8, name:'Palak', emoji:'🌿', unit:'1 bundle', price:15, cat:'sabzi' },
  { id:9, name:'Karela', emoji:'🫑', unit:'500 g', price:28, cat:'sabzi' },
  { id:10, name:'Tinda', emoji:'🥬', unit:'500 g', price:20, cat:'sabzi' },
  // Fruits
  { id:11, name:'Kela', emoji:'🍌', unit:'12 pcs', price:40, cat:'fruits' },
  { id:12, name:'Seb', emoji:'🍎', unit:'1 kg', price:120, cat:'fruits', badge:'Fresh' },
  { id:13, name:'Aam', emoji:'🥭', unit:'1 kg', price:80, cat:'fruits', badge:'Season' },
  { id:14, name:'Angoor', emoji:'🍇', unit:'500 g', price:60, cat:'fruits' },
  { id:15, name:'Papita', emoji:'🍈', unit:'1 pcs', price:40, cat:'fruits' },
  { id:16, name:'Narangi', emoji:'🍊', unit:'1 kg', price:70, cat:'fruits' },
  // Dal
  { id:17, name:'Arhar Dal', emoji:'🫘', unit:'500 g', price:65, cat:'dal' },
  { id:18, name:'Moong Dal', emoji:'🟡', unit:'500 g', price:55, cat:'dal' },
  { id:19, name:'Chana Dal', emoji:'🟤', unit:'500 g', price:50, cat:'dal' },
  { id:20, name:'Masoor Dal', emoji:'🔴', unit:'500 g', price:48, cat:'dal' },
  { id:21, name:'Basmati Chawal', emoji:'🍚', unit:'1 kg', price:75, cat:'dal' },
  // Masale
  { id:22, name:'Haldi', emoji:'🟡', unit:'100 g', price:20, cat:'masale' },
  { id:23, name:'Mirchi Powder', emoji:'🌶️', unit:'100 g', price:25, cat:'masale' },
  { id:24, name:'Jeera', emoji:'⚫', unit:'100 g', price:30, cat:'masale' },
  { id:25, name:'Dhaniya', emoji:'🌿', unit:'100 g', price:18, cat:'masale' },
  { id:26, name:'Garam Masala', emoji:'🟤', unit:'50 g', price:35, cat:'masale' },
  // Dairy
  { id:27, name:'Doodh', emoji:'🥛', unit:'500 ml', price:28, cat:'dairy' },
  { id:28, name:'Dahi', emoji:'🍶', unit:'500 g', price:40, cat:'dairy' },
  { id:29, name:'Paneer', emoji:'🧀', unit:'200 g', price:80, cat:'dairy', badge:'Fresh' },
  { id:30, name:'Makhan', emoji:'🧈', unit:'100 g', price:55, cat:'dairy' },
];

let cart = {};
let currentCat = 'all';
let searchQuery = '';

function getDeliveryCharge(subtotal) {
  if (subtotal <= 300) return 50;
  if (subtotal <= 500) return 65;
  return Math.round(subtotal * 0.12);
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const titles = { all: 'Sab Products', sabzi: '🥬 Sabzi', fruits: '🍎 Fruits', dal: '🫘 Dal & Chawal', masale: '🌶️ Masale', dairy: '🥛 Dairy' };
  document.getElementById('productTitle').textContent = titles[cat] || 'Products';
  renderProducts();
}

function filterProducts(q) {
  searchQuery = q.toLowerCase();
  renderProducts();
}

function renderProducts() {
  let list = products;
  if (currentCat !== 'all') list = list.filter(p => p.cat === currentCat);
  if (searchQuery) list = list.filter(p => p.name.toLowerCase().includes(searchQuery));
  
  const grid = document.getElementById('productsGrid');
  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">Koi product nahi mila 😕</div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const qty = cart[p.id] || 0;
    return `
      <div class="product-card">
        <div class="product-img">
          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
          ${p.emoji}
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-unit">${p.unit}</div>
          <div class="product-bottom">
            <div class="product-price">₹${p.price}</div>
            ${qty === 0
              ? `<button class="add-btn" onclick="addItem(${p.id})">+</button>`
              : `<div class="qty-control">
                  <button class="qty-btn" onclick="removeItem(${p.id})">−</button>
                  <span class="qty-num">${qty}</span>
                  <button class="qty-btn" onclick="addItem(${p.id})">+</button>
                </div>`
            }
          </div>
        </div>
      </div>`;
  }).join('');
}

function addItem(id) {
  cart[id] = (cart[id] || 0) + 1;
  const p = products.find(x => x.id === id);
  showToast(`${p.emoji} ${p.name} add hua!`);
  updateUI();
}

function removeItem(id) {
  if (cart[id] > 0) cart[id]--;
  if (cart[id] === 0) delete cart[id];
  updateUI();
}

function updateUI() {
  const keys = Object.keys(cart);
  const totalItems = keys.reduce((a, k) => a + cart[k], 0);
  const subtotal = keys.reduce((a, k) => a + cart[k] * products.find(p => p.id == k).price, 0);
  
  document.getElementById('cartCount').textContent = totalItems;
  document.getElementById('cartBarItems').textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
  document.getElementById('cartBarTotal').textContent = `₹${subtotal}`;
  
  const bar = document.getElementById('cartBar');
  if (totalItems > 0) bar.classList.add('visible');
  else bar.classList.remove('visible');
  
  renderProducts();
  if (document.getElementById('cartModal').classList.contains('open')) renderCart();
}

function renderCart() {
  const keys = Object.keys(cart);
  const content = document.getElementById('cartContent');
  
  if (keys.length === 0) {
    content.innerHTML = `<div class="empty-cart"><span class="emoji">🛒</span>Cart khaali hai!<br>Kuch add karo pehle.</div>`;
    return;
  }
  
  const subtotal = keys.reduce((a, k) => a + cart[k] * products.find(p => p.id == k).price, 0);
  const delivery = getDeliveryCharge(subtotal);
  const total = subtotal + delivery;
  
  const itemsHtml = keys.map(k => {
    const p = products.find(x => x.id == k);
    return `<div class="cart-item">
      <div class="cart-item-emoji">${p.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">₹${p.price} × ${cart[k]}</div>
      </div>
      <div class="cart-item-right">
        <div class="cart-item-total">₹${p.price * cart[k]}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="removeItem(${p.id});renderCart()">−</button>
          <span class="qty-num">${cart[k]}</span>
          <button class="qty-btn" onclick="addItem(${p.id});renderCart()">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  
  const deliveryNote = subtotal <= 300 ? 'Orders up to ₹300' : subtotal <= 500 ? 'Orders ₹301–₹500' : 'Orders ₹500+ (12%)';
  
  content.innerHTML = `
    <div class="cart-items">${itemsHtml}</div>
    <div class="bill">
      <div class="bill-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
      <div class="bill-row"><span>Delivery Charge</span><span>₹${delivery}</span></div>
      <div class="bill-delivery">(${deliveryNote})</div>
      <div class="bill-row total"><span>Total</span><span>₹${total}</span></div>
    </div>
    <button class="whatsapp-btn" onclick="orderWhatsApp(${subtotal}, ${delivery}, ${total})">
      📲 WhatsApp Pe Order Karo
    </button>`;
}

function orderWhatsApp(subtotal, delivery, total) {
  const keys = Object.keys(cart);
  let msg = '🛒 *SabjiHaat Order*\n_Bazaar Se Ghar Tak_\n\n';
  keys.forEach(k => {
    const p = products.find(x => x.id == k);
    msg += `• ${p.name} × ${cart[k]} = ₹${p.price * cart[k]}\n`;
  });
  msg += `\n💰 Subtotal: ₹${subtotal}\n🚴 Delivery: ₹${delivery}\n✅ *Total: ₹${total}*\n\n📍 Apna address bhejein`;
  const phone = '919155713260';
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function openCart() {
  document.getElementById('cartModal').classList.add('open');
  renderCart();
}

function closeCartOutside(e) {
  if (e.target === document.getElementById('cartModal')) {
    document.getElementById('cartModal').classList.remove('open');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// Init
renderProducts();
</script>
</body>
